name: CI/CD - Build & Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        # Node 18 is EOL (April 2025) and Vite 7 needs Node 20.19+ /
        # 22.12+. Test full versions on Linux (cheap), smoke-test the
        # other OSes on the recommended version only.
        include:
          - os: ubuntu-latest
            node-version: 20.x
          - os: ubuntu-latest
            node-version: 22.x
          - os: windows-latest
            node-version: 22.x
          - os: macos-latest
            node-version: 22.x

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Build web app (Vite)
      run: npm run build

    - name: Run tests
      run: npm run test:run

    - name: Type check
      run: npx tsc --noEmit
      continue-on-error: true

    - name: Upload build artifacts
      uses: actions/upload-artifact@v4
      if: runner.os == 'Linux' && matrix.node-version == '22.x'
      with:
        name: build-artifacts
        path: dist/
        retention-days: 5
