name: Build & Release

# Triggers on a version tag (e.g. v0.21.0). The job builds Electron
# binaries for Linux/macOS/Windows and lets electron-builder upload
# them — together with the latest.yml / latest-mac.yml / latest-linux.yml
# files that electron-updater consumes — straight to the GitHub Release
# matching the tag.
#
# Required secrets:
#   - GITHUB_TOKEN (auto-provided by Actions; sufficient for uploading
#     to the same repo's Releases).
# Optional (for code-signed builds):
#   - CSC_LINK / CSC_KEY_PASSWORD              — macOS / Windows code-signing
#   - APPLE_ID / APPLE_APP_SPECIFIC_PASSWORD   — macOS notarization
#   - APPLE_TEAM_ID                            — macOS notarization
#
# Without signing certs the binaries are usable but trigger SmartScreen
# (Windows) and Gatekeeper (macOS) warnings on first launch, and the
# auto-updater on Windows will refuse the update due to signature
# mismatch. See README "Releases" for details.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # required for electron-builder to create/edit Releases

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Build web app
        run: npm run build

      - name: Build & publish Electron
        run: npx electron-builder --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code-signing — only used if the corresponding secrets are set.
          CSC_LINK:                 ${{ secrets.CSC_LINK }}
          CSC_KEY_PASSWORD:         ${{ secrets.CSC_KEY_PASSWORD }}
          APPLE_ID:                 ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID:            ${{ secrets.APPLE_TEAM_ID }}
