<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self'; img-src 'self' data:; font-src 'self' data:; media-src 'self'; connect-src 'self'; frame-src 'none'; object-src 'none'; base-uri 'self'; form-action 'self'; upgrade-insecure-requests">
  <title>Future Pinball Web — Tisch-Editor</title>
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#00aaff">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="FP Web">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0a0a14; color: #ccd; font-family: 'Courier New', monospace;
      display: flex; flex-direction: column; height: 100vh; overflow: hidden;
    }

    /* ── Top Bar ─────────────────────────────────────────────────────────── */
    #top-bar {
      background: linear-gradient(180deg, #12121e 0%, #0e0e1a 100%);
      border-bottom: 1px solid #1a1a30;
      padding: 8px 16px;
      display: flex; align-items: center; gap: 16px;
      flex-shrink: 0; min-height: 48px;
    }
    #top-bar h1 { color: #00aaff; font-size: 14px; letter-spacing: 3px; text-shadow: 0 0 10px #00aaff; white-space: nowrap; }
    #top-bar .sep { color: #224; font-size: 18px; }
    #elem-count { color: #556; font-size: 11px; letter-spacing: 1px; flex: 1; }

    /* Demo-Tische Buttons */
    .demo-row { display: flex; gap: 6px; margin-left: auto; }
    .demo-btn {
      padding: 4px 10px; background: rgba(0,30,60,0.8);
      border: 1px solid #225; border-radius: 4px; color: #556;
      font-family: 'Courier New', monospace; font-size: 10px;
      cursor: pointer; letter-spacing: 1px; transition: all 0.2s;
    }
    .demo-btn:hover { border-color: #00aaff; color: #00aaff; }

    /* Action Buttons */
    .action-btn {
      padding: 6px 14px; border-radius: 5px;
      font-family: 'Courier New', monospace; font-size: 11px;
      letter-spacing: 1px; cursor: pointer; transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-import { background: rgba(0,50,100,0.5); border: 1px solid #336; color: #66a; }
    .btn-import:hover { border-color: #00aaff; color: #00aaff; }
    .btn-export { background: rgba(0,80,40,0.5); border: 1px solid #264; color: #6a8; }
    .btn-export:hover { border-color: #00cc66; color: #00cc66; }
    .btn-play {
      background: linear-gradient(135deg, #224400, #113300);
      border: 1px solid #00cc66; color: #00cc66;
      text-shadow: 0 0 8px #00cc66;
      padding: 6px 18px;
    }
    .btn-play:hover { background: linear-gradient(135deg, #336600, #224400); box-shadow: 0 0 14px rgba(0,200,100,0.4); }

    /* ── Main Layout ─────────────────────────────────────────────────────── */
    #main { display: flex; flex: 1; overflow: hidden; }

    /* ── Left Toolbar ────────────────────────────────────────────────────── */
    #toolbar {
      width: 56px; background: #0d0d1a; border-right: 1px solid #1a1a2e;
      display: flex; flex-direction: column; align-items: center;
      padding: 10px 0; gap: 6px; flex-shrink: 0;
    }
    .tool-btn {
      width: 40px; height: 40px;
      background: rgba(0,20,50,0.6); border: 1px solid #1a2a40;
      border-radius: 7px; cursor: pointer; font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      transition: all 0.2s; color: #445; position: relative;
    }
    .tool-btn:hover { border-color: #00aaff; color: #00aaff; background: rgba(0,60,130,0.3); }
    .tool-btn.active { border-color: #00aaff; color: #00aaff; background: rgba(0,100,200,0.25); box-shadow: 0 0 10px rgba(0,150,255,0.3); }
    .tool-btn title { display: none; }

    .toolbar-sep { width: 32px; height: 1px; background: #1a1a2e; margin: 4px 0; }

    /* Farb-Kreis */
    #color-dot {
      width: 28px; height: 28px; border-radius: 50%;
      border: 2px solid #334; cursor: pointer;
      transition: all 0.2s;
    }
    #color-dot:hover { border-color: #fff; transform: scale(1.1); }
    #color-label { color: #334; font-size: 8px; letter-spacing: 0.5px; }

    /* Snap-Button */
    #snap-btn {
      width: 40px; padding: 4px 0;
      background: rgba(0,20,50,0.6); border: 1px solid #1a2a40;
      border-radius: 5px; color: #334; font-family: 'Courier New',monospace;
      font-size: 8px; cursor: pointer; text-align: center; letter-spacing: 0px;
      line-height: 1.3;
    }
    #snap-btn.active { border-color: #00cc66; color: #00cc66; }

    /* ── Canvas Wrapper ──────────────────────────────────────────────────── */
    #canvas-wrap {
      flex: 1; display: flex; align-items: center; justify-content: center;
      background: #080810; overflow: hidden; position: relative;
    }
    #editor-canvas {
      border: 1px solid #223;
      box-shadow: 0 0 40px rgba(0,0,0,0.8);
      cursor: default;
    }
    #canvas-label {
      position: absolute; bottom: 10px; left: 50%; transform: translateX(-50%);
      color: #334; font-size: 10px; letter-spacing: 1px; pointer-events: none;
    }

    /* ── Right Sidebar ───────────────────────────────────────────────────── */
    #sidebar {
      width: 220px; background: #0d0d1a; border-left: 1px solid #1a1a2e;
      display: flex; flex-direction: column; flex-shrink: 0; overflow: hidden;
    }

    /* Table Properties */
    #tbl-props {
      padding: 12px 14px; border-bottom: 1px solid #1a1a2e;
    }
    #tbl-props h3 { color: #446; font-size: 10px; letter-spacing: 2px; margin-bottom: 10px; }
    .tbl-row { margin-bottom: 8px; }
    .tbl-row label { display: block; color: #445; font-size: 10px; letter-spacing: 1px; margin-bottom: 3px; }
    .tbl-row input[type=text],
    .tbl-row input[type=color] {
      width: 100%; padding: 5px 7px;
      background: rgba(0,10,30,0.8); border: 1px solid #223;
      border-radius: 4px; color: #aab;
      font-family: 'Courier New', monospace; font-size: 11px;
      outline: none; transition: border-color 0.2s;
    }
    .tbl-row input[type=text]:focus { border-color: #00aaff; }
    .tbl-row input[type=color] { height: 28px; padding: 2px; cursor: pointer; }

    /* Element Props */
    #props-section {
      flex: 1; overflow-y: auto; padding: 12px 14px;
    }
    #props-section h3 { color: #446; font-size: 10px; letter-spacing: 2px; margin-bottom: 10px; }
    #props-panel { font-size: 11px; }

    .hint { color: #334; font-size: 10px; line-height: 1.9; }
    .key { display: inline-block; padding: 1px 5px; background: #112; border: 1px solid #334; border-radius: 3px; color: #556; font-size: 9px; }

    .prop-type { color: #00aaff; font-size: 12px; letter-spacing: 2px; margin-bottom: 10px; text-shadow: 0 0 6px #00aaff44; }
    .prop-row { display: flex; align-items: center; gap: 8px; margin-bottom: 7px; }
    .prop-row label { color: #445; font-size: 10px; width: 20px; flex-shrink: 0; }
    .prop-row input[type=number] {
      flex: 1; padding: 4px 6px; background: rgba(0,10,30,0.8);
      border: 1px solid #223; border-radius: 4px; color: #aab;
      font-family: 'Courier New', monospace; font-size: 11px;
      outline: none;
    }
    .prop-row input[type=number]:focus { border-color: #00aaff; }

    .color-row { display: flex; flex-wrap: wrap; gap: 5px; margin: 4px 0 10px 0; }
    .color-swatch {
      width: 22px; height: 22px; border-radius: 4px;
      border: 2px solid transparent; cursor: pointer;
      transition: all 0.15s;
    }
    .color-swatch:hover { transform: scale(1.2); border-color: #fff; }
    .color-swatch.active { border-color: #fff; box-shadow: 0 0 6px rgba(255,255,255,0.6); }

    .btn-del {
      width: 100%; padding: 7px; margin-top: 6px;
      background: rgba(80,0,0,0.3); border: 1px solid #622;
      border-radius: 5px; color: #a44; cursor: pointer;
      font-family: 'Courier New', monospace; font-size: 11px;
      transition: all 0.2s;
    }
    .btn-del:hover { background: rgba(120,0,0,0.4); border-color: #944; color: #f66; }

    /* Scrollbar */
    #props-section::-webkit-scrollbar { width: 4px; }
    #props-section::-webkit-scrollbar-track { background: #0a0a14; }
    #props-section::-webkit-scrollbar-thumb { background: #223; border-radius: 2px; }
  </style>
</head>
<body>

  <!-- Top Bar -->
  <div id="top-bar">
    <h1>⚡ TISCH-EDITOR</h1>
    <span class="sep">|</span>
    <span id="elem-count">0 Bumper · 0 Targets · 0 Rampen</span>

    <div class="demo-row">
      <span style="color:#334;font-size:10px;align-self:center;">DEMO:</span>
      <button class="demo-btn" onclick="loadDemo('classic')">CLASSIC</button>
      <button class="demo-btn" onclick="loadDemo('space')">SPACE</button>
      <button class="demo-btn" onclick="loadDemo('fire')">FIRE</button>
    </div>

    <button class="action-btn btn-import" onclick="importJSON()">📂 LADEN</button>
    <button class="action-btn btn-export" onclick="exportJSON()">📤 EXPORT</button>
    <button class="action-btn btn-play"   onclick="openInGame()">▶ IM SPIEL ÖFFNEN</button>
  </div>

  <!-- Main -->
  <div id="main">

    <!-- Left Toolbar -->
    <div id="toolbar">
      <button class="tool-btn active" id="tool-select" onclick="setTool('select')" title="Auswählen (S)">⊹</button>
      <div class="toolbar-sep"></div>
      <button class="tool-btn" id="tool-bumper" onclick="setTool('bumper')" title="Bumper hinzufügen (B)">●</button>
      <button class="tool-btn" id="tool-target" onclick="setTool('target')" title="Target hinzufügen (T)">▪</button>
      <button class="tool-btn" id="tool-ramp"   onclick="setTool('ramp')"   title="Rampe hinzufügen (R)">╱</button>
      <div class="toolbar-sep"></div>
      <div id="color-dot" onclick="cycleColor()" title="Farbe wechseln"></div>
      <span id="color-label">FARBE</span>
      <div class="toolbar-sep"></div>
      <button id="snap-btn" class="active" onclick="toggleSnap()" title="Raster-Einrastung">⊞<br>SNAP<br>AN</button>
      <div class="toolbar-sep"></div>
      <button class="tool-btn" onclick="clearAll()" title="Alles löschen" style="font-size:15px;">🗑</button>
    </div>

    <!-- Canvas -->
    <div id="canvas-wrap">
      <canvas id="editor-canvas"></canvas>
      <div id="canvas-label">X: -3..+3 &nbsp;|&nbsp; Y: -6..+6 &nbsp;|&nbsp; DRAIN bei Y=-5.5 &nbsp;|&nbsp; LANE rechts Y.2</div>
    </div>

    <!-- Right Sidebar -->
    <div id="sidebar">

      <div id="tbl-props">
        <h3>TISCH-PROPERTIES</h3>
        <div class="tbl-row">
          <label>NAME</label>
          <input type="text" id="tbl-name" value="Mein Tisch" placeholder="Tischname...">
        </div>
        <div class="tbl-row">
          <label>HINTERGRUND</label>
          <input type="color" id="tbl-color" value="#1a2a18">
        </div>
        <div class="tbl-row">
          <label>AKZENTFARBE</label>
          <input type="color" id="tbl-accent" value="#00ff66">
        </div>
      </div>

      <div id="props-section">
        <h3>ELEMENT</h3>
        <div id="props-panel">
          <p class="hint">Kein Element gewählt.</p>
        </div>
      </div>

    </div>
  </div>

  <script type="module" src="./editor.ts"></script>
</body>
</html>
